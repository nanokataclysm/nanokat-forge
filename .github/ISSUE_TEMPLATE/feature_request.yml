name: Feature request
description: Propose a change that fits Forge’s human-gated plan → preview kernel.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer small, demoable slices. Multi-agent Mission Society and production signing
        are design-tracked separately — say if this is that lane or the live path.
  - type: textarea
    id: problem
    attributes:
      label: Problem / opportunity
      placeholder: Who is blocked, and what do they need?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: User-visible flow. Call out human approval and what must never auto-deploy.
    validations:
      required: true
  - type: dropdown
    id: lane
    attributes:
      label: Lane
      options:
        - Live path (orchestrator / Cloud Run demo)
        - Evidence / docs only
        - Signing / receipts (see docs/handoffs/sylvia-signing.md)
        - Mission Society multi-agent (design; not default live claim)
        - MCP / agent tooling
        - Unsure
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Explicit non-goals
      placeholder: "e.g. no client-side private keys, no fake research as live sources"
  - type: checkboxes
    id: honesty
    attributes:
      label: Product honesty
      options:
        - label: I will not describe unshipped work as live on Cloud Run
          required: true
